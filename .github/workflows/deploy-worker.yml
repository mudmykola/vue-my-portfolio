name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Build frontend
        env:
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
          VITE_CONTACT_API_URL: ${{ secrets.VITE_CONTACT_API_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_DEFAULT_OG_IMAGE_PATH: ${{ secrets.VITE_DEFAULT_OG_IMAGE_PATH }}
          VITE_DEFAULT_OG_IMAGE_ALT: ${{ secrets.VITE_DEFAULT_OG_IMAGE_ALT }}
          VITE_DEFAULT_OG_IMAGE_WIDTH: ${{ secrets.VITE_DEFAULT_OG_IMAGE_WIDTH }}
          VITE_DEFAULT_OG_IMAGE_HEIGHT: ${{ secrets.VITE_DEFAULT_OG_IMAGE_HEIGHT }}
        run: npm run build

      - name: Deploy worker with Wrangler CLI
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config worker/wrangler.toml
